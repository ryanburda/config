[bar.default]
background_opacity = 0.4999999888241291
center = []
end = [
    "notifications",
    "network",
    "bluetooth",
    "volume",
    "brightness",
    "battery",
    "date",
    "clock",
    "control-center",
    "session"
]
margin_ends = 8
start = [ "taskbar" ]
widget_spacing = 12

[dock]
auto_hide = true
reserve_space = false
show_dots = true

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@DP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 1746.0
    cy = 1845.0
    output = "DP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

[theme]
source = "wallpaper"

[wallpaper]
directory = "/home/ryanburda/code/assets/base/assets/backgrounds"

    [wallpaper.default]
    path = "/home/ryanburda/code/assets/base/assets/backgrounds/warm-cafe.jpg"

    [wallpaper.last]
    path = "/home/ryanburda/code/assets/base/assets/backgrounds/warm-cafe.jpg"

    [wallpaper.monitors.DP-1]
    path = "/home/ryanburda/code/assets/base/assets/backgrounds/warm-cafe.jpg"

[widget.date]
format = "{:%d %b}"

[widget.network]
show_label = false

[widget.taskbar]
group_by_workspace = true
inactive_opacity = 0.69999999999999996
scale = 1.1500000000000001

[widget.volume]
show_label = false